<!DOCTYPE html>

<head>
  <title>Pokédex Kanto Starters</title>
  <link rel="stylesheet" href="estilos.css">

</head>
<body>
  <div id="lista">
    <h2>Pokédex</h2>

    <div class="card">

    </div>

    <div class="card">
      <img src="img/02.png" alt="Ivysaur">
      <span class="nombre">Ivysaur</span>
      <button id="2" onClick="mostrar2()">VER</button>
    </div>

    <div class="card">
      <img src="img/03.png" alt="Venusaur">
      <span class="nombre">Venusaur</span>
      <button id="3" onClick="mostar">VER</button>
    </div>

    <div class="card">
      <img src="img/04.png" alt="Charmander">
      <span class="nombre">Charmander</span>
      <button id="4" onClick="mostar">VER</button>
    </div>

    <div class="card">
      <img src="img/05.png" alt="Charmeleon">
      <span class="nombre">Charmeleon</span>

    </div>

    <div class="card">

    </div>

    <div class="card">
      <img src="img/07.png" alt="Squirtle">

    </div>

    <div class="card">
      <img src="img/08.png" alt="Wartortle">
      <span class="nombre">Wartortle</span>
      <button id="9" onClick="mostar">VER</button>
    </div>

    <div class="card">
      <img src="img/09.png" alt="Blastoise">
      <span class="nombre">Blastoise</span>
      <button id="9" onClick="mostar">VER</button>
    </div>
  </div>








  <div id="detalle">
    <h2 id="detalle-nombre">Bulbasaur</h2>
    <img id="pokedex-img" src="img/p-01.png" alt="Entrada Pokédex de Bulbasaur">
  </div>


  <div id="detalle2">
    <h2 id="detalle-nombre">Bulbasaur</h2>
    <img id="pokedex-img" src="img/p-02.png" alt="Entrada Pokédex de Bulbasaur">
